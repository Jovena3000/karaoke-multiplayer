<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Karaokê Multiplayer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #764ba2;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .links {
            text-align: center;
            margin-top: 20px;
        }
        .links a {
            color: #667eea;
            text-decoration: none;
            cursor: pointer;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .alert {
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none;
        }
        .alert.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        .alert.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        /* Modal de Recuperação de Senha */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            width: 90%;
            max-width: 450px;
            position: relative;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e0e0e0;
        }
        .modal-header h3 {
            color: #333;
            font-size: 1.3rem;
        }
        .modal-close {
            font-size: 28px;
            cursor: pointer;
            color: #999;
            transition: color 0.3s;
            line-height: 1;
        }
        .modal-close:hover {
            color: #333;
        }
        .modal-body {
            margin-bottom: 25px;
        }
        .modal-body p {
            color: #666;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        .modal-footer {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
        }
        .btn-modal {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-modal-cancel {
            background: #f0f0f0;
            color: #666;
        }
        .btn-modal-cancel:hover {
            background: #e0e0e0;
        }
        .btn-modal-submit {
            background: #667eea;
            color: white;
        }
        .btn-modal-submit:hover {
            background: #764ba2;
        }
        .btn-modal-submit:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .email-sent-icon {
            text-align: center;
            font-size: 3rem;
            margin: 20px 0;
        }
        .success-message {
            text-align: center;
            color: #28a745;
            font-weight: bold;
            margin: 15px 0;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🎤 Karaokê Multiplayer</h1>
        
        <div id="alertMessage" class="alert"></div>
        
        <form id="loginForm" onsubmit="fazerLogin(event)">
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" id="email" required placeholder="seu@email.com">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="senha" required placeholder="Digite sua senha">
            </div>
            <button type="submit">Entrar</button>
        </form>
        
        <div class="links">
            <p>Não tem acesso? <a href="/checkout.html">Comprar um plano</a></p>
            <p><a href="javascript:void(0)" onclick="abrirModalRecuperarSenha(event)">Esqueci minha senha</a></p>
        </div>
    </div>

    <!-- Modal de Recuperação de Senha -->
    <div id="modalRecuperarSenha" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>🔐 Recuperar Senha</h3>
                <span class="modal-close" onclick="fecharModalRecuperarSenha()">&times;</span>
            </div>
            <div class="modal-body">
                <p>Digite seu e-mail cadastrado para receber as instruções de recuperação de senha.</p>
                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" id="recuperarEmail" placeholder="seu@email.com" autocomplete="off">
                </div>
                <div id="modalAlert" style="font-size: 0.85rem; margin-top: 10px; display: none;"></div>
            </div>
            <div class="modal-footer">
                <button class="btn-modal btn-modal-cancel" onclick="fecharModalRecuperarSenha()">Cancelar</button>
                <button class="btn-modal btn-modal-submit" id="btnRecuperarSenha" onclick="enviarRecuperacaoSenha()">Enviar</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://karaoke-api-backend3.vercel.app/api';

        // ========== FUNÇÕES DE LOGIN ==========
        
        async function fazerLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;

            const submitBtn = document.querySelector('#loginForm button');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Entrando...';

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, senha })
                });

                const data = await response.json();

                if (data.sucesso) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('usuario', JSON.stringify(data.usuario));
                    
                    mostrarAlerta('Login realizado com sucesso!', 'success');
                    
                    const redirectUrl = localStorage.getItem('redirectAfterLogin');
                    if (redirectUrl) {
                        localStorage.removeItem('redirectAfterLogin');
                        setTimeout(() => {
                            window.location.href = redirectUrl;
                        }, 1000);
                    } else {
                        setTimeout(() => {
                            window.location.href = '/app.html';
                        }, 1000);
                    }
                } else {
                    mostrarAlerta(data.mensagem || 'E-mail ou senha inválidos', 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Entrar';
                }
            } catch (error) {
                console.error('Erro:', error);
                mostrarAlerta('Erro ao conectar com o servidor', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Entrar';
            }
        }

        function mostrarAlerta(mensagem, tipo) {
            const alertEl = document.getElementById('alertMessage');
            alertEl.textContent = mensagem;
            alertEl.className = `alert ${tipo}`;
            
            setTimeout(() => {
                alertEl.className = 'alert';
            }, 5000);
        }

        // ========== FUNÇÕES DE RECUPERAÇÃO DE SENHA ==========
        
        function abrirModalRecuperarSenha(event) {
            if (event) event.preventDefault();
            const modal = document.getElementById('modalRecuperarSenha');
            const emailInput = document.getElementById('recuperarEmail');
            const modalAlert = document.getElementById('modalAlert');
            
            if (modal) {
                if (emailInput) emailInput.value = '';
                if (modalAlert) {
                    modalAlert.style.display = 'none';
                    modalAlert.innerHTML = '';
                }
                modal.classList.add('active');
                if (emailInput) emailInput.focus();
            } else {
                console.error('Modal não encontrado');
                alert('Erro ao abrir recuperação de senha. Tente novamente.');
            }
        }

        function fecharModalRecuperarSenha() {
            const modal = document.getElementById('modalRecuperarSenha');
            if (modal) {
                modal.classList.remove('active');
            }
        }

        async function enviarRecuperacaoSenha() {
            const email = document.getElementById('recuperarEmail').value;
            const modalAlert = document.getElementById('modalAlert');
            const btn = document.getElementById('btnRecuperarSenha');
            
            if (!email || !email.includes('@')) {
                modalAlert.innerHTML = '<span style="color: #dc3545;">❌ Por favor, digite um e-mail válido.</span>';
                modalAlert.style.display = 'block';
                return;
            }
            
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> Enviando...';
            modalAlert.style.display = 'block';
            modalAlert.innerHTML = '<span style="color: #667eea;">⏳ Enviando solicitação...</span>';
            
            try {
                // Chamada real para a API
                const response = await fetch(`${API_URL}/auth/recuperar-senha`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email })
                });
                
                const data = await response.json();
                
                if (data.sucesso) {
                    modalAlert.innerHTML = `
                        <div style="text-align: center;">
                            <div class="email-sent-icon">📧✨</div>
                            <div class="success-message">${data.mensagem || 'E-mail de recuperação enviado!'}</div>
                            <p style="color: #28a745; margin-top: 10px;">Verifique sua caixa de entrada e siga as instruções para redefinir sua senha.</p>
                            <p style="color: #666; font-size: 0.8rem; margin-top: 10px;">Não recebeu? Verifique a pasta de spam.</p>
                        </div>
                    `;
                    
                    setTimeout(() => {
                        fecharModalRecuperarSenha();
                    }, 4000);
                } else {
                    modalAlert.innerHTML = `<span style="color: #dc3545;">❌ ${data.mensagem || 'E-mail não encontrado em nosso sistema.'}</span>`;
                    btn.disabled = false;
                    btn.innerHTML = 'Enviar';
                }
                
            } catch (error) {
                console.error('Erro na recuperação:', error);
                modalAlert.innerHTML = '<span style="color: #dc3545;">❌ Erro ao conectar com o servidor. Tente novamente mais tarde.</span>';
                btn.disabled = false;
                btn.innerHTML = 'Enviar';
            }
        }

        // Fechar modal ao clicar fora
        window.onclick = function(event) {
            const modal = document.getElementById('modalRecuperarSenha');
            if (event.target === modal) {
                fecharModalRecuperarSenha();
            }
        }

        // Fechar modal com tecla ESC
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                fecharModalRecuperarSenha();
            }
        });

        // Verificar se já está logado e redirecionar
        if (localStorage.getItem('token')) {
            window.location.href = '/app.html';
        }
    </script>
</body>
</html>
