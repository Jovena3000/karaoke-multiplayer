<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Finalizar Compra - Karaokê Multiplayer</title>

    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" sizes="any">
    <link rel="icon" href="/favicon.ico">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">

    <!-- Mercado Pago SDK v2 -->
    <script src="https://sdk.mercadopago.com/js/v2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        .modal-enter { animation: modalFadeIn 0.3s ease; }
        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to   { opacity: 1; transform: scale(1); }
        }
        .plan-card.selected {
            border-color: #6366f1 !important;
            background-color: #eef2ff !important;
        }
        /* 🔧 CORREÇÃO: Garante que o Brick ocupe todo espaço */
        #cardPaymentBrick_container {
            min-height: 400px;
            width: 100%;
        }
        #cardPaymentBrick_container > div,
        #cardPaymentBrick_container iframe {
            width: 100% !important;
            min-height: 380px !important;
        }
        .brick-skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
            height: 380px;
            width: 100%;
        }
        @keyframes shimmer {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        /* 🔧 CORREÇÃO: Remove zoom em mobile */
        input, select, textarea {
            font-size: 16px !important;
        }
		
		/* 🔧 CORREÇÃO: Garante que o Brick apareça corretamente */
#cardPaymentBrick_container {
    min-height: 420px;
    width: 100%;
    transition: all 0.3s ease;
}

#cardPaymentBrick_container > div,
#cardPaymentBrick_container iframe {
    width: 100% !important;
    min-height: 400px !important;
    border-radius: 12px !important;
}

/* Estilo para os campos do formulário */
.mp-card-form-field {
    margin-bottom: 16px !important;
}

.mp-card-form-field input {
    font-size: 16px !important;
    padding: 12px !important;
    border-radius: 8px !important;
    border: 1px solid #e2e8f0 !important;
}

/* Botão de pagamento personalizado */
#customCardPayBtn {
    transition: all 0.3s ease;
}

#customCardPayBtn:active {
    transform: scale(0.98);
}
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
    // ================= CONFIG =================
    // 🔧 CORREÇÃO 1: URL correta (sem o número 3, ou use variável de ambiente)
    const API_URL = 'https://karaoke-api-backend.vercel.app/api';
    // Se tiver erro, tente também:
    // const API_URL = 'https://karaoke-api-backend3.vercel.app/api';
    
    const MP_PUBLIC_KEY = 'APP_USR-63ba9966-8d21-4c54-ba75-ac07077ee125';

    let mp                   = null;
    let bricksBuilder        = null;
    let cardBrickController  = null;
    let brickLoading         = false;
    let brickMounted         = false;
    let selectedPlan         = 'trimestral';
    let currentPaymentMethod = 'card';
    let pagamentoAprovado    = false;
    let pixDataAtual         = null;
    let statusCheckInterval  = null;

    const PLANS = {
        mensal:     { name: 'Plano Mensal',     price: 5.00,   originalPrice: 5.00,   description: 'Válido por 1 mês',    save: 'Pagamento mensal',    period: '1 mês',    features: ['Salas ilimitadas', 'Músicas liberadas', 'Suporte básico'] },
        trimestral: { name: 'Plano Trimestral', price: 49.90,  originalPrice: 74.70,  description: 'Válido por 3 meses',  save: 'Economize R$ 24,80',  period: '3 meses',  features: ['Salas ilimitadas', 'Histórico de músicas', 'Sistema de pontuação', 'Reações especiais', 'Emojis premium', 'Suporte prioritário'] },
        semestral:  { name: 'Plano Semestral',  price: 89.90,  originalPrice: 149.40, description: 'Válido por 6 meses',  save: 'Economize R$ 59,50',  period: '6 meses',  features: ['Salas ilimitadas', 'Histórico de músicas', 'Sistema de pontuação', 'Reações especiais', 'Emojis premium', 'Suporte prioritário'] },
        anual:      { name: 'Plano Anual',      price: 159.90, originalPrice: 298.80, description: 'Válido por 12 meses', save: 'Economize R$ 138,90', period: '12 meses', features: ['Salas ilimitadas', 'Histórico de músicas', 'Sistema de pontuação', 'Reações especiais', 'Emojis premium', 'Suporte prioritário'] }
    };

    function formatCurrency(v) { return v.toFixed(2).replace('.', ','); }

    // ================= INIT MP =================
    async function initMercadoPago() {
        return new Promise((resolve) => {
            let attempts = 0;
            function tryInit() {
                attempts++;
                if (typeof MercadoPago !== 'undefined') {
                    mp = new MercadoPago(MP_PUBLIC_KEY, { locale: 'pt-BR' });
                    bricksBuilder = mp.bricks();
                    console.log('✅ MP SDK + Bricks prontos');
                    resolve();
                } else if (attempts < 20) {
                    console.log(`⏳ Aguardando MP SDK... (${attempts})`);
                    setTimeout(tryInit, 300);
                } else {
                    console.error('❌ Falha ao carregar MP SDK');
                    showAlert('Erro ao carregar Mercado Pago. Recarregue a página.', 'error');
                }
            }
            tryInit();
        });
    }

    // ================= ALERTAS =================
    function showAlert(msg, type) {
        const el = document.getElementById('customAlert');
        if (!el) return;
        el.innerHTML = `
            <div class="fixed bottom-4 right-4 z-50">
                <div class="px-4 py-3 rounded-xl shadow-lg flex items-center gap-2
                    ${type === 'error' ? 'bg-red-50 text-red-700 border border-red-200' : 'bg-green-50 text-green-700 border border-green-200'}">
                    ${type === 'error' ? '❌' : '✅'} ${msg}
                </div>
            </div>`;
        setTimeout(() => { el.innerHTML = ''; }, 5000);
    }

    function showModal(title, message, type = 'loading', extraHtml = '') {
        const modal = document.getElementById('paymentModal');
        const iconEl = document.getElementById('modalIcon');
        const titleEl = document.getElementById('modalTitle');
        const messageEl = document.getElementById('modalMessage');
        const progressEl = document.getElementById('modalProgress');
        const extraEl = document.getElementById('modalExtra');
        const closeBtn = document.getElementById('modalCloseBtn');

        modal.classList.remove('hidden');
        modal.classList.add('flex');
        document.body.style.overflow = 'hidden';
        closeBtn.style.display = 'none';

        if (type === 'loading') {
            iconEl.innerHTML = '<i class="fas fa-spinner fa-pulse text-4xl text-indigo-500"></i>';
            progressEl.classList.remove('hidden');
            let progress = 0;
            const iv = setInterval(() => {
                progress += 10;
                const bar = document.getElementById('progressBar');
                if (bar) bar.style.width = progress + '%';
                if (progress >= 90) clearInterval(iv);
            }, 200);
        } else if (type === 'success') {
            iconEl.innerHTML = '<i class="fas fa-check-circle text-5xl text-green-500"></i>';
            progressEl.classList.add('hidden');
            closeBtn.style.display = 'block';
        } else if (type === 'error') {
            iconEl.innerHTML = '<i class="fas fa-times-circle text-5xl text-red-500"></i>';
            progressEl.classList.add('hidden');
            closeBtn.style.display = 'block';
        } else if (type === 'pix') {
            iconEl.innerHTML = '<img src="https://img.icons8.com/color/48/pix.png" class="w-16 h-16">';
            progressEl.classList.add('hidden');
            closeBtn.style.display = 'block';
        }

        titleEl.textContent = title;
        messageEl.textContent = message;
        if (extraHtml) extraEl.innerHTML = extraHtml;
    }

    function hideModal() {
        const modal = document.getElementById('paymentModal');
        modal.classList.add('hidden');
        modal.classList.remove('flex');
        document.body.style.overflow = 'auto';
        if (pagamentoAprovado) window.location.href = '/sucesso.html';
    }

    // ================= PLANO =================
    window.selectPlan = function(plan) {
        selectedPlan = plan;
        document.querySelectorAll('.plan-card').forEach(c =>
            c.classList.remove('selected', 'border-indigo-500', 'bg-indigo-50', 'scale-[1.02]'));
        const card = document.getElementById(`plan-${plan}`);
        if (card) card.classList.add('selected', 'border-indigo-500', 'bg-indigo-50', 'scale-[1.02]');
        updateOrderSummary();
        // 🔧 CORREÇÃO 2: Recria o Brick apenas se estiver em modo cartão
        if (currentPaymentMethod === 'card') {
            recreateCardBrick();
        }
    };

    function updateOrderSummary() {
        const plan = PLANS[selectedPlan];
        const hasDiscount = plan.originalPrice > plan.price;
        const discount = plan.originalPrice - plan.price;

        document.getElementById('planName').textContent = plan.name;
        document.getElementById('planPeriod').textContent = plan.period;
        document.getElementById('planPrice').innerHTML = `R$ ${formatCurrency(plan.price)}` +
            (hasDiscount ? `<span class="text-base text-gray-400 line-through ml-2">R$ ${formatCurrency(plan.originalPrice)}</span>` : '');

        document.getElementById('planFeatures').innerHTML = plan.features.map(f => `
            <li class="flex items-center gap-2 text-gray-600 text-sm">
                <span class="flex-shrink-0 w-4 h-4 bg-green-100 rounded-full flex items-center justify-center">
                    <svg class="w-2.5 h-2.5 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
                    </svg>
                </span>${f}
            </li>`).join('');

        document.getElementById('subtotal').innerHTML = hasDiscount
            ? `<span class="line-through text-gray-400">R$ ${formatCurrency(plan.originalPrice)}</span>`
            : `R$ ${formatCurrency(plan.originalPrice)}`;

        const discountRow = document.getElementById('discountRow');
        if (hasDiscount) {
            discountRow.classList.remove('hidden');
            document.getElementById('discountValue').innerHTML =
                `<span class="text-green-600 font-bold">-R$ ${formatCurrency(discount)}</span>`;
        } else {
            discountRow.classList.add('hidden');
        }
        document.getElementById('totalAmount').innerHTML =
            `<span class="text-green-600 font-bold text-lg">R$ ${formatCurrency(plan.price)}</span>`;
    }

    // ================= MÉTODO =================
    window.selectPaymentMethod = function(method) {
        currentPaymentMethod = method;
        document.querySelectorAll('.payment-method-btn').forEach(b => {
            b.classList.remove('border-indigo-500','bg-indigo-50','text-indigo-700',
                               'border-teal-500','bg-teal-50','text-teal-700');
            b.classList.add('border-gray-200','text-gray-500');
        });

        const cardSection = document.getElementById('cardSection');
        const pixSection = document.getElementById('pixSection');
        const payBtn = document.getElementById('payButton');

        if (method === 'card') {
            document.getElementById('method-card').classList.add('border-indigo-500','bg-indigo-50','text-indigo-700');
            cardSection.classList.remove('hidden');
            pixSection.classList.add('hidden');
            payBtn.classList.add('hidden');
            // 🔧 CORREÇÃO 3: Recria Brick com delay
            setTimeout(() => recreateCardBrick(), 100);
        } else {
            document.getElementById('method-pix').classList.add('border-teal-500','bg-teal-50','text-teal-700');
            cardSection.classList.add('hidden');
            pixSection.classList.remove('hidden');
            payBtn.classList.remove('hidden');
            payBtn.innerHTML = `⚡ Gerar QR Code PIX · R$ ${formatCurrency(PLANS[selectedPlan].price)}`;
            destroyCardBrick();
        }
    };

        // ================= BRICKS CARTÃO CORRIGIDO =================
async function destroyCardBrick() {
    if (cardBrickController) {
        try { 
            await cardBrickController.unmount(); 
            console.log('✅ Brick desmontado');
        } catch(e) {
            console.log('Erro ao desmontar:', e);
        }
        cardBrickController = null;
    }
    brickMounted = false;
    brickLoading = false;
    
    // Limpa o container mas NÃO adiciona skeleton (deixa vazio para recriar)
    const container = document.getElementById('cardPaymentBrick_container');
    if (container) {
        container.innerHTML = '';
        container.style.minHeight = '400px';
    }
}

async function recreateCardBrick() {
    if (brickLoading) {
        console.log('⏳ Brick já carregando, ignorando.');
        return;
    }
    
    if (!mp || !bricksBuilder) {
        console.log('⏳ SDK não pronto, aguardando...');
        setTimeout(() => recreateCardBrick(), 500);
        return;
    }

    brickLoading = true;
    brickMounted = false;

    // Destroi o brick existente
    if (cardBrickController) {
        try { 
            await cardBrickController.unmount(); 
        } catch(e) {}
        cardBrickController = null;
    }

    const container = document.getElementById('cardPaymentBrick_container');
    if (!container) return;
    
    // Limpa o container e mostra loading visual
    container.innerHTML = `
        <div class="flex justify-center items-center py-12">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600"></div>
            <span class="ml-2 text-gray-500">Carregando formulário seguro...</span>
        </div>
    `;

    const email = document.getElementById('email')?.value?.trim() || '';
    const plan = PLANS[selectedPlan];
    
    console.log('🚀 Criando Brick para:', { amount: plan.price, email });

    try {
        cardBrickController = await bricksBuilder.create(
            'cardPayment',
            'cardPaymentBrick_container',
            {
                initialization: {
                    amount: plan.price,
                    payer: email ? { email } : undefined
                },
                customization: {
                    visual: {  // 🔧 CORRIGIDO: era "视觉" agora é "visual"
                        style: {
                            theme: 'default',
                            customVariables: {
                                baseColor: '#6366f1',
                                baseColorFirstVariant: '#4f46e5',
                                baseColorSecondVariant: '#4338ca',
                                errorColor: '#ef4444',
                                successColor: '#22c55e',
                                fontSizeSmall: '13px',
                                fontSizeMedium: '15px',
                                borderRadiusMedium: '8px',
                                formInputPadding: '12px',
                                formInputBorderRadius: '8px',
                            }
                        },
                        hideFormTitle: false,
                        hidePaymentButton: true,
                    },
                    paymentMethods: {
                        types: {
                            included: ['credit_card'],
                        }
                    }
                },
                callbacks: {
                    onReady: () => {
                        console.log('✅ Card Brick montado com sucesso!');
                        brickLoading = false;
                        brickMounted = true;
                        showAlert('Formulário de cartão carregado!', 'success');
                        addCustomPayButton();
                    },
                    onSubmit: async (cardFormData) => {
                        console.log('📝 Formulário submetido:', cardFormData);
                        await processCardBrickPayment(cardFormData);
                    },
                    onError: (error) => {
                        console.error('❌ Brick error:', error);
                        brickLoading = false;
                        brickMounted = false;
                        
                        let errorMsg = 'Erro no formulário. ';
                        if (error.message) errorMsg += error.message;
                        else if (error.type === 'critical') errorMsg += 'Tente recarregar a página.';
                        else errorMsg += 'Tente novamente.';
                        
                        showAlert(errorMsg, 'error');
                        setTimeout(() => recreateCardBrick(), 2000);
                    }
                }
            }
        );
    } catch(err) {
        console.error('❌ Erro ao criar Brick:', err);
        brickLoading = false;
        brickMounted = false;
        if (container) {
            container.innerHTML = `
                <div class="bg-red-50 border border-red-200 rounded-lg p-6 text-center">
                    <p class="text-red-700 font-semibold mb-2">⚠️ Não foi possível carregar o formulário de pagamento</p>
                    <p class="text-red-600 text-sm mb-4">${err.message || 'Erro de conexão com o Mercado Pago'}</p>
                    <button onclick="location.reload()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700">
                        🔄 Recarregar página
                    </button>
                </div>
            `;
        }
    }
}

// 🔧 CORREÇÃO: Adiciona botão de pagamento personalizado após o Brick carregar
function addCustomPayButton() {
    // Remove botão existente se houver
    const existingBtn = document.getElementById('customCardPayBtn');
    if (existingBtn) existingBtn.remove();
    
    // Encontra o container do Brick
    const brickContainer = document.getElementById('cardPaymentBrick_container');
    if (!brickContainer) return;
    
    // Cria botão personalizado
    const payButton = document.createElement('button');
    payButton.id = 'customCardPayBtn';
    payButton.innerHTML = `
        <div class="flex items-center justify-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            Pagar R$ ${formatCurrency(PLANS[selectedPlan].price)}
        </div>
    `;
    payButton.className = 'w-full mt-4 py-3 rounded-lg font-bold text-white bg-gradient-to-r from-green-500 to-green-600 hover:from-green-600 hover:to-green-700 transition-all shadow-lg';
    payButton.onclick = async () => {
        payButton.disabled = true;
        payButton.innerHTML = '<div class="animate-spin rounded-full h-5 w-5 border-2 border-white border-t-transparent inline-block"></div> Processando...';
        
        // Aciona o submit do Brick
        if (cardBrickController && cardBrickController.getCardFormData) {
            const formData = await cardBrickController.getCardFormData();
            await processCardBrickPayment(formData);
        } else {
            showAlert('Erro: formulário não está pronto', 'error');
        }
        
        payButton.disabled = false;
        payButton.innerHTML = `Pagar R$ ${formatCurrency(PLANS[selectedPlan].price)}`;
    };
    
    // Adiciona o botão após o container do Brick
    brickContainer.parentNode.insertBefore(payButton, brickContainer.nextSibling);
}

// ================= PAGAMENTO CARTÃO CORRIGIDO =================
async function processCardBrickPayment(cardFormData) {
    const email = document.getElementById('email')?.value?.trim();

    if (!email || !email.includes('@')) {
        showAlert('Digite um e-mail válido antes de pagar.', 'error');
        return;
    }

    showModal('Processando pagamento...', 'Autorizando transação', 'loading');

    try {
        console.log('📦 Enviando pagamento:', {
            metodo: 'card',
            token: cardFormData.token,
            plan: selectedPlan,
            email
        });

        // 🔧 CORREÇÃO: Verifica se o token existe
        if (!cardFormData.token) {
            throw new Error('Token do cartão não gerado. Preencha todos os dados corretamente.');
        }

        const response = await fetch(`${API_URL}/criar-pagamento`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                metodo: 'card',
                token: cardFormData.token,
                payment_method_id: cardFormData.payment_method_id,
                installments: cardFormData.installments || 1,
                issuer_id: cardFormData.issuer_id,
                cpf: cardFormData.payer?.identification?.number || '',
                email: email,
                plan: selectedPlan
            })
        });

        const data = await response.json();
        console.log('📦 Resposta backend:', data);

        if (data.sucesso === true) {
            pagamentoAprovado = true;
            localStorage.setItem('pagamento_aprovado', JSON.stringify({ email, plan: selectedPlan, data: data }));
            showModal('✅ Pagamento Confirmado!', 'Seu pagamento foi aprovado. Redirecionando...', 'success');
            setTimeout(() => { 
                window.location.href = '/sucesso.html'; 
            }, 2000);
        } else {
            throw new Error(data.erro || data.mensagem || 'Pagamento recusado pelo banco');
        }
    } catch(err) {
        console.error('❌ Erro no pagamento:', err);
        showModal('❌ Falha no Pagamento', err.message, 'error');
        
        // Recria o Brick após erro para permitir nova tentativa
        setTimeout(() => recreateCardBrick(), 2000);
    }
}

    // ================= PIX =================
    async function processPixPayment() {
        const email = document.getElementById('email')?.value?.trim();
        if (!email || !email.includes('@')) { 
            showAlert('Digite um e-mail válido.', 'error'); 
            return false; 
        }

        showModal('Gerando PIX...', 'Criando QR Code para pagamento', 'loading');

        try {
            const response = await fetch(`${API_URL}/criar-pagamento`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ metodo: 'pix', email, plan: selectedPlan })
            });
            const data = await response.json();

            if (data.sucesso) {
                pixDataAtual = data;
                const qrHtml = `
                    <div class="text-center mt-4">
                        <div class="bg-white p-4 rounded-2xl inline-block">
                            <img src="data:image/jpeg;base64,${data.qr_code_base64 || ''}" class="w-48 h-48 mx-auto" alt="QR Code PIX">
                        </div>
                        <p class="text-xs text-gray-500 mt-3 break-all bg-gray-50 p-3 rounded-lg">${data.qr_code || ''}</p>
                        <button onclick="copyPixCode()" class="mt-3 bg-teal-500 text-white px-6 py-2 rounded-lg hover:bg-teal-600">
                            📋 Copiar código PIX
                        </button>
                        <p class="text-xs text-gray-400 mt-3">⏱️ QR Code válido por 30 minutos</p>
                    </div>`;
                showModal('Pagamento via PIX', 'Escaneie o QR Code com o app do seu banco', 'pix', qrHtml);
                localStorage.setItem('pagamento_pendente', JSON.stringify({ email, plan: selectedPlan, id: data.id }));

                if (statusCheckInterval) clearInterval(statusCheckInterval);
                statusCheckInterval = setInterval(async () => {
                    try {
                        const st = await (await fetch(`${API_URL}/verificar-pagamento?id=${data.id}`)).json();
                        if (st.status === 'approved') {
                            clearInterval(statusCheckInterval);
                            pagamentoAprovado = true;
                            localStorage.setItem('pagamento_aprovado', JSON.stringify({ email, plan: selectedPlan }));
                            showModal('✅ Pagamento Confirmado!', 'PIX confirmado! Redirecionando...', 'success');
                            setTimeout(() => { window.location.href = '/sucesso.html'; }, 2000);
                        }
                    } catch(e) { console.error('Erro ao verificar PIX:', e); }
                }, 5000);
                return true;
            } else {
                throw new Error(data.erro || 'Erro ao gerar PIX');
            }
        } catch(err) {
            showModal('❌ Erro', err.message, 'error');
            return false;
        }
    }

    window.copyPixCode = function() {
        if (pixDataAtual?.qr_code) {
            navigator.clipboard.writeText(pixDataAtual.qr_code);
            showAlert('Código PIX copiado!', 'success');
        }
    };

    window.processPayment = async function() {
        const btn = document.getElementById('payButton');
        btn.disabled = true;
        btn.innerHTML = '<div class="animate-spin rounded-full h-5 w-5 border-2 border-white border-t-transparent inline-block mr-2"></div> Processando...';
        const ok = await processPixPayment();
        if (!ok) {
            btn.disabled = false;
            btn.innerHTML = `⚡ Gerar QR Code PIX · R$ ${formatCurrency(PLANS[selectedPlan].price)}`;
        }
    };

    // ================= RENDER =================
    function renderApp() {
        const plan = PLANS[selectedPlan];
        const hasDiscount = plan.originalPrice > plan.price;

        document.getElementById('root').innerHTML = `
        <div class="min-h-screen bg-gradient-to-br from-indigo-600 via-purple-600 to-indigo-800 py-6 px-4">
            <div class="fixed inset-0 overflow-hidden pointer-events-none">
                <div class="absolute -top-40 -left-40 w-96 h-96 bg-white opacity-5 rounded-full blur-3xl"></div>
                <div class="absolute -bottom-40 -right-40 w-96 h-96 bg-purple-300 opacity-10 rounded-full blur-3xl"></div>
            </div>
            <div class="relative max-w-6xl mx-auto">
                <header class="text-center text-white mb-4">
                    <div class="flex items-center justify-center gap-3 mb-2">
                        <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center backdrop-blur-sm"><span class="text-2xl">🎤</span></div>
                        <h1 class="text-2xl sm:text-3xl font-extrabold tracking-tight">Karaokê Multiplayer</h1>
                    </div>
                    <div class="flex items-center justify-center gap-2 text-white/80 text-sm">
                        <svg class="w-4 h-4 text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                        <span>Checkout 100% Seguro</span><span class="w-1 h-1 bg-white/40 rounded-full"></span>
                        <span>SSL Criptografado</span><span class="w-1 h-1 bg-white/40 rounded-full"></span>
                        <span>Mercado Pago</span>
                    </div>
                </header>

                <div class="mb-6">
                    <h2 class="text-white text-center text-xl font-bold mb-4">Escolha seu plano:</h2>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">
                        ${Object.entries(PLANS).map(([key, p]) => `
                        <div id="plan-${key}" onclick="selectPlan('${key}')"
                            class="plan-card bg-white rounded-xl border-2 ${key === 'trimestral' ? 'border-yellow-400' : 'border-gray-200'} p-4 cursor-pointer transition-all duration-200 relative ${key === selectedPlan ? 'selected border-indigo-500 bg-indigo-50 scale-[1.02]' : ''}">
                            ${key === 'trimestral' ? '<span class="absolute -top-3 right-3 bg-yellow-400 text-gray-800 text-xs font-bold py-1 px-3 rounded-full shadow">⭐ RECOMENDADO</span>' : ''}
                            <div class="font-bold text-gray-800">${p.name}</div>
                            <div class="text-indigo-600 font-extrabold text-2xl">R$ ${formatCurrency(p.price)}</div>
                            <div class="text-gray-500 text-xs mt-1">${p.description}</div>
                            <div class="mt-2 inline-block bg-green-100 text-green-700 text-xs font-semibold px-2 py-0.5 rounded-full">${p.save}</div>
                        </div>`).join('')}
                    </div>
                </div>

                <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">
                    <div class="grid grid-cols-1 lg:grid-cols-2">
                        <!-- Resumo -->
                        <div class="border-b lg:border-b-0 lg:border-r border-gray-100 p-5 sm:p-7 bg-gray-50/50">
                            <div class="bg-gray-50 rounded-xl p-5 h-full">
                                <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2">🛒 Seu Pedido</h2>
                                <div class="bg-white rounded-xl p-4 mb-4 shadow-sm border border-gray-100">
                                    <div class="flex items-center justify-between mb-1">
                                        <span class="font-bold text-gray-800" id="planName">${plan.name}</span>
                                        <span class="text-xs text-gray-400 bg-gray-100 px-2 py-0.5 rounded-full" id="planPeriod">${plan.period}</span>
                                    </div>
                                    <div class="text-3xl font-extrabold text-indigo-600 my-2" id="planPrice">
                                        R$ ${formatCurrency(plan.price)}${hasDiscount ? `<span class="text-base text-gray-400 line-through ml-2">R$ ${formatCurrency(plan.originalPrice)}</span>` : ''}
                                    </div>
                                    <ul class="space-y-1.5" id="planFeatures">
                                        ${plan.features.map(f => `
                                        <li class="flex items-center gap-2 text-gray-600 text-sm">
                                            <span class="flex-shrink-0 w-4 h-4 bg-green-100 rounded-full flex items-center justify-center">
                                                <svg class="w-2.5 h-2.5 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
                                            </span>${f}
                                        </li>`).join('')}
                                    </ul>
                                </div>
                                <div class="border-t border-gray-200 pt-4 space-y-2">
                                    <div class="flex justify-between text-gray-500 text-sm"><span>Subtotal</span><span id="subtotal">${hasDiscount ? `<span class="line-through text-gray-400">R$ ${formatCurrency(plan.originalPrice)}</span>` : `R$ ${formatCurrency(plan.originalPrice)}`}</span></div>
                                    <div id="discountRow" class="flex justify-between text-sm text-gray-500 ${hasDiscount ? '' : 'hidden'}"><span>Desconto</span><span id="discountValue"><span class="text-green-600 font-bold">-R$ ${formatCurrency(plan.originalPrice - plan.price)}</span></span></div>
                                    <div class="flex justify-between text-gray-800 font-bold text-lg border-t border-gray-200 pt-2"><span>Total</span><span id="totalAmount"><span class="text-green-600 font-bold">R$ ${formatCurrency(plan.price)}</span></span></div>
                                </div>
                                <div class="mt-4 bg-gradient-to-r from-yellow-400 to-amber-400 rounded-xl p-4 text-center">
                                    <p class="font-bold text-gray-800 text-sm">🎁 Bônus de Boas-vindas!</p>
                                    <p class="text-gray-700 text-xs mt-1">Você ganhou <strong>7 dias grátis</strong> adicionais ao seu plano.</p>
                                </div>
                                <div class="mt-4 grid grid-cols-3 gap-2 text-center">
                                    <div class="bg-white rounded-lg p-2 border border-gray-100 shadow-sm"><div class="text-lg">🔒</div><div class="text-xs text-gray-500 leading-tight">SSL 256-bit</div></div>
                                    <div class="bg-white rounded-lg p-2 border border-gray-100 shadow-sm"><div class="text-lg">↩️</div><div class="text-xs text-gray-500 leading-tight">7 dias garantia</div></div>
                                    <div class="bg-white rounded-lg p-2 border border-gray-100 shadow-sm"><div class="text-lg">⚡</div><div class="text-xs text-gray-500 leading-tight">Acesso imediato</div></div>
                                </div>
                            </div>
                        </div>

                        <!-- Pagamento -->
                        <div class="p-5 sm:p-7">
                            <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2">💳 Forma de Pagamento</h2>

                            <div class="mb-5">
                                <label class="block text-sm font-semibold text-gray-700 mb-1.5">📧 Seu melhor e-mail</label>
                                <input type="email" id="email" placeholder="exemplo@email.com"
                                    class="w-full border border-gray-300 rounded-lg px-4 py-3 text-gray-800 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all"
                                    oninput="onEmailChange()">
                                <p class="text-xs text-gray-400 mt-1">Enviaremos sua senha de acesso para este e-mail.</p>
                            </div>

                            <div class="flex gap-3 mb-5">
                                <button id="method-card" onclick="selectPaymentMethod('card')"
                                    class="payment-method-btn flex-1 flex items-center justify-center gap-2 py-3 rounded-xl border-2 font-semibold text-sm transition-all border-indigo-500 bg-indigo-50 text-indigo-700">
                                    <div class="flex -space-x-1">
                                        <span class="w-6 h-5 bg-blue-900 rounded text-white text-[8px] flex items-center justify-center">VISA</span>
                                        <span class="w-6 h-5 bg-red-500 rounded text-white text-[8px] flex items-center justify-center">MC</span>
                                    </div>
                                    Cartão de Crédito
                                </button>
                                <button id="method-pix" onclick="selectPaymentMethod('pix')"
                                    class="payment-method-btn flex-1 flex items-center justify-center gap-2 py-3 rounded-xl border-2 font-semibold text-sm transition-all border-gray-200 text-gray-500">
                                    <svg viewBox="0 0 24 24" class="w-5 h-5 fill-current text-teal-500"><path d="M9.5 2.5l3 3-3 3-3-3 3-3zm5 5l3 3-3 3-3-3 3-3zm-10 0l3 3-3 3-3-3 3-3zm5 5l3 3-3 3-3-3 3-3z"/></svg>
                                    PIX
                                    <span class="text-xs bg-teal-100 text-teal-700 px-1.5 py-0.5 rounded-full">Instantâneo</span>
                                </button>
                            </div>

                            <!-- Cartão (Bricks) -->
                            <div id="cardSection">
                                <p class="text-xs text-gray-500 mb-3 flex items-center gap-1">
                                    <svg class="w-3 h-3 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                                    Formulário seguro pelo Mercado Pago
                                </p>
                                <div id="cardPaymentBrick_container" style="min-height: 400px;">
                                    <div class="brick-skeleton"></div>
                                </div>
                            </div>

                            <!-- PIX -->
                            <div id="pixSection" class="hidden">
                                <div class="text-center bg-teal-50 rounded-2xl p-6 border border-teal-100">
                                    <div class="w-32 h-32 mx-auto bg-gray-100 rounded-xl flex items-center justify-center border-2 border-dashed border-gray-300 mb-4">
                                        <svg class="w-16 h-16 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"/></svg>
                                    </div>
                                    <p class="text-gray-600 text-sm mb-3">Clique em <strong>"Gerar PIX"</strong> para criar seu QR Code</p>
                                    <div class="space-y-2 text-left text-sm text-gray-600">
                                        <div class="flex items-center gap-2"><span>⚡</span><span>Confirmação em até 1 minuto</span></div>
                                        <div class="flex items-center gap-2"><span>🔒</span><span>Transação segura via Banco Central</span></div>
                                        <div class="flex items-center gap-2"><span>📱</span><span>Qualquer banco ou carteira digital</span></div>
                                    </div>
                                </div>
                            </div>

                            <button id="payButton" onclick="processPayment()"
                                class="hidden mt-4 w-full py-4 rounded-xl font-bold text-lg text-white bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 transition-all flex items-center justify-center gap-2 shadow-lg">
                                ⚡ Gerar QR Code PIX · R$ ${formatCurrency(plan.price)}
                            </button>

                            <div class="mt-4 text-center">
                                <div class="inline-flex items-center gap-3 bg-green-50 border border-green-200 rounded-2xl px-4 py-3">
                                    <div class="text-3xl">🛡️</div>
                                    <div class="text-left">
                                        <p class="font-bold text-green-800 text-sm">Garantia de 7 dias</p>
                                        <p class="text-green-600 text-xs">Reembolso total sem perguntas</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="border-t border-gray-100 px-6 py-4 bg-gray-50 flex flex-col sm:flex-row items-center justify-between gap-3 text-xs text-gray-400">
                        <div class="flex items-center gap-2">
                            <svg class="w-4 h-4 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
                            Pagamento processado com segurança pelo <strong class="text-gray-500 ml-1">Mercado Pago</strong>
                        </div>
                        <div class="flex items-center gap-4">
                            <a href="#" class="hover:text-gray-600">Termos de uso</a>
                            <a href="#" class="hover:text-gray-600">Política de privacidade</a>
                            <a href="#" class="hover:text-gray-600">Suporte</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="paymentModal" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 hidden items-center justify-center">
            <div class="bg-white rounded-2xl max-w-md w-full mx-4 p-6 text-center modal-enter">
                <div id="modalIcon" class="mb-4"><i class="fas fa-spinner fa-pulse text-4xl text-indigo-500"></i></div>
                <h3 id="modalTitle" class="text-xl font-bold text-gray-800 mb-2">Processando...</h3>
                <p id="modalMessage" class="text-gray-500 mb-4">Aguarde</p>
                <div id="modalProgress" class="w-full h-1 bg-gray-200 rounded-full overflow-hidden mb-4">
                    <div id="progressBar" class="h-full bg-green-500 rounded-full" style="width:0%;transition:width 0.2s ease;"></div>
                </div>
                <div id="modalExtra"></div>
                <button id="modalCloseBtn" onclick="hideModal()" class="mt-4 bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 transition-all hidden">Fechar</button>
            </div>
        </div>

        <div id="customAlert"></div>
        `;
    }

    // Debounce no e-mail
    let emailDebounce = null;
    window.onEmailChange = function() {
        clearTimeout(emailDebounce);
        emailDebounce = setTimeout(() => {
            if (currentPaymentMethod === 'card' && brickMounted) {
                recreateCardBrick();
            }
        }, 1000);
    };

    // ================= BOOT =================
    renderApp();

    initMercadoPago().then(() => {
        const urlParams = new URLSearchParams(window.location.search);
        const planFromUrl = urlParams.get('plan');
        if (planFromUrl && PLANS[planFromUrl]) {
            selectPlan(planFromUrl);
        }
        // Aguarda um pouco e cria o Brick
        setTimeout(() => {
            recreateCardBrick();
        }, 500);
    }).catch(err => {
        console.error('❌ Falha ao iniciar MP:', err);
        document.getElementById('cardPaymentBrick_container').innerHTML = `
            <div class="bg-red-50 border border-red-200 rounded-lg p-4 text-center">
                <p class="text-red-700 font-semibold">❌ Erro ao carregar Mercado Pago</p>
                <p class="text-red-600 text-sm mt-2">Verifique sua conexão e recarregue a página</p>
                <button onclick="location.reload()" class="mt-3 bg-indigo-600 text-white px-4 py-2 rounded-lg">
                    🔄 Recarregar
                </button>
            </div>`;
    });
    </script>
</body>
</html>
