<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SyncRoom - Sala do Anfitrião</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 100%);
      color: #fff;
      min-height: 100vh;
      padding: 1rem;
    }

    :root {
      --purple: #7c3aed;
      --pink: #ec4899;
      --dark: #0f0f1e;
      --light: #2a2a3e;
      --muted: #a1a1b0;
      --txt: #f0f0f0;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* TOP BAR */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      padding: 0.8rem 1.2rem;
      border-radius: 1rem;
      margin-bottom: 1.5rem;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .logo {
      font-size: 1.3rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--purple), var(--pink));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .room-info {
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .room-code {
      background: var(--light);
      padding: 0.4rem 0.9rem;
      border-radius: 2rem;
      font-size: 0.85rem;
      font-family: monospace;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .copy-btn {
      background: var(--purple);
      border: none;
      color: white;
      padding: 0.4rem 0.9rem;
      border-radius: 2rem;
      cursor: pointer;
      font-size: 0.8rem;
      transition: opacity 0.2s;
    }

    .copy-btn:hover {
      opacity: 0.8;
    }

    /* MAIN GRID */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 350px;
      gap: 1.2rem;
    }

    /* PLAYER AREA */
    .player-area {
      background: #000;
      border-radius: 1rem;
      overflow: hidden;
      aspect-ratio: 16/9;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    #player {
      width: 100%;
      height: 100%;
    }

    .player-controls {
      display: flex;
      gap: 0.8rem;
      margin-top: 1rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .ctrl-btn {
      background: var(--light);
      border: none;
      color: white;
      padding: 0.6rem 1.2rem;
      border-radius: 2rem;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }

    .ctrl-btn:hover {
      background: var(--purple);
      transform: scale(1.02);
    }

    .auto-toggle {
      background: var(--purple);
    }

    /* QUEUE SECTION */
    .queue-section {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border-radius: 1rem;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .queue-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .queue-title {
      font-size: 1.2rem;
      font-weight: 600;
    }

    .add-music-btn {
      background: linear-gradient(135deg, var(--purple), var(--pink));
      border: none;
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: opacity 0.2s;
    }

    .queue-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      max-height: 500px;
      overflow-y: auto;
    }

    .queue-item {
      background: var(--light);
      border-radius: 0.7rem;
      padding: 0.6rem;
      display: flex;
      gap: 0.7rem;
      align-items: center;
      transition: all 0.2s;
    }

    .queue-item.playing {
      background: linear-gradient(135deg, rgba(124, 58, 237, 0.3), rgba(236, 72, 153, 0.3));
      border-left: 3px solid var(--pink);
    }

    .queue-thumb {
      width: 50px;
      height: 38px;
      object-fit: cover;
      border-radius: 0.4rem;
      flex-shrink: 0;
    }

    .queue-info {
      flex: 1;
      min-width: 0;
    }

    .queue-title-text {
      font-size: 0.85rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .queue-meta {
      font-size: 0.7rem;
      color: var(--muted);
    }

    .queue-actions {
      display: flex;
      gap: 0.4rem;
    }

    .queue-btn {
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: white;
      padding: 0.3rem 0.6rem;
      border-radius: 0.4rem;
      cursor: pointer;
      font-size: 0.7rem;
    }

    .queue-btn.danger:hover {
      background: #ff4757;
    }

    /* ACTIVITY LOG */
    .activity-log {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 0.7rem;
      padding: 0.7rem;
      margin-top: 0.5rem;
    }

    .log-title {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .log-list {
      list-style: none;
      font-size: 0.75rem;
      max-height: 120px;
      overflow-y: auto;
    }

    .log-list li {
      padding: 0.3rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      color: var(--muted);
    }

    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal.open {
      display: flex;
    }

    .m-box {
      background: var(--dark);
      border-radius: 1.2rem;
      padding: 1.5rem;
      max-width: 500px;
      width: 90%;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .m-title {
      font-size: 1.3rem;
      font-weight: 600;
      margin-bottom: 1.2rem;
    }

    .inp-grp {
      margin-bottom: 1rem;
    }

    .inp-lbl {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0.3rem;
    }

    .inp {
      width: 100%;
      background: var(--light);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 0.7rem 1rem;
      border-radius: 0.6rem;
      color: white;
      font-size: 0.9rem;
    }

    .inp:focus {
      outline: none;
      border-color: var(--purple);
    }

    .m-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--purple), var(--pink));
      border: none;
      color: white;
      padding: 0.7rem;
      border-radius: 0.6rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .m-btn.dim {
      background: var(--light);
      margin-top: 0.5rem;
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.9);
      color: white;
      padding: 0.7rem 1.2rem;
      border-radius: 2rem;
      font-size: 0.85rem;
      z-index: 2000;
      animation: fadeInUp 0.3s ease;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    @media (max-width: 768px) {
      .main-grid {
        grid-template-columns: 1fr;
      }
      body {
        padding: 0.5rem;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <div class="logo">🎵 SyncRoom — Anfitrião</div>
    <div class="room-info">
      <div class="room-code" id="roomCode">Carregando...</div>
      <button class="copy-btn" onclick="copyRoomCode()">📋 Copiar código</button>
    </div>
  </div>

  <div class="main-grid">
    <div>
      <div class="player-area">
        <div id="player"></div>
      </div>
      <div class="player-controls">
        <button class="ctrl-btn" onclick="playVideo()">▶ Play</button>
        <button class="ctrl-btn" onclick="pauseVideo()">⏸ Pause</button>
        <button class="ctrl-btn" onclick="skipVideo()">⏭ Próximo</button>
        <button class="ctrl-btn auto-toggle" id="autoBtn" onclick="toggleAuto()">🔄 Auto-play: ON</button>
      </div>
    </div>

    <div class="queue-section">
      <div class="queue-header">
        <div class="queue-title">📋 Fila de Músicas</div>
        <button class="add-music-btn" onclick="openVidModal()">➕ Adicionar</button>
      </div>
      <ul class="queue-list" id="queueList">
        <li style="color:var(--muted); text-align:center;">Nenhuma música na fila</li>
      </ul>
      <div class="activity-log">
        <div class="log-title">📝 Atividade recente</div>
        <ul class="log-list" id="logList">
          <li>Bem-vindo à sala!</li>
        </ul>
      </div>
    </div>
  </div>
</div>

<!-- MODAL: VÍDEO -->
<div class="modal" id="vidModal">
  <div class="m-box">
    <div class="m-title">🎬 Adicionar à Fila</div>

    <!-- ABAS -->
    <div style="display:flex;gap:.4rem;margin-bottom:1.1rem;background:var(--light);border-radius:.6rem;padding:.3rem">
      <button id="tabLink" onclick="switchTab('link')" style="flex:1;padding:.55rem;border:none;border-radius:.45rem;font-weight:600;font-size:.85rem;cursor:pointer;transition:background .2s,color .2s;background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff">🔗 Colar Link</button>
      <button id="tabSearch" onclick="switchTab('search')" style="flex:1;padding:.55rem;border:none;border-radius:.45rem;font-weight:600;font-size:.85rem;cursor:pointer;transition:background .2s,color .2s;background:transparent;color:var(--muted)">🔍 Buscar</button>
    </div>

    <!-- ABA: COLAR LINK -->
    <div id="paneLink">
      <div class="inp-grp">
        <label class="inp-lbl">Cole o link do YouTube:</label>
        <input type="text" class="inp" id="vidInp" placeholder="https://youtube.com/watch?v=..." autocomplete="off">
      </div>
      <button class="m-btn" onclick="addQueue()">➕ Adicionar à Fila</button>
    </div>

    <!-- ABA: BUSCAR -->
    <div id="paneSearch" style="display:none">
      <div class="inp-grp" style="margin-bottom:.7rem">
        <label class="inp-lbl">Buscar música no YouTube:</label>
        <div style="display:flex;gap:.4rem">
          <input type="text" class="inp" id="searchInp" placeholder="Nome da música ou artista..." autocomplete="off" style="flex:1">
          <button class="m-btn" onclick="doSearch()" style="width:auto;padding:.85rem 1rem;font-size:.85rem">🔍</button>
        </div>
      </div>
      <div id="searchResults" style="max-height:340px;overflow-y:auto;display:flex;flex-direction:column;gap:.5rem">
        <div style="text-align:center;color:var(--muted);padding:1.5rem;font-size:.85rem">Digite algo para buscar 🎵</div>
      </div>
    </div>

    <button class="m-btn dim" onclick="closeVidModal()" style="margin-top:.6rem">Cancelar</button>
  </div>
</div>

<script>
  // ==================== CONFIGURAÇÕES INICIAIS ====================
  let player;
  let queue = [];
  let qPos = -1;
  let autoOn = true;
  let roomId, userId, userName;
  let socket;
  let sbOk = false;
  let syncTimer = null;

  // Elementos DOM
  const $ = id => document.getElementById(id);

  // ==================== FUNÇÕES AUXILIARES ====================
  function toast(msg, isErr = false) {
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    t.style.background = isErr ? '#ff4757' : 'rgba(0,0,0,0.9)';
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  function copyRoomCode() {
    navigator.clipboard.writeText(roomId);
    toast('Código copiado!');
  }

  function addAct(icon, text) {
    const logDiv = $('logList');
    const li = document.createElement('li');
    li.innerHTML = `${icon} ${text}`;
    logDiv.prepend(li);
    if (logDiv.children.length > 20) logDiv.removeChild(logDiv.lastChild);
  }

  // ==================== YOUTUBE PLAYER API ====================
  function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
      height: '100%',
      width: '100%',
      videoId: '',
      playerVars: { 'autoplay': 0, 'controls': 1, 'modestbranding': 1, 'rel': 0 },
      events: {
        'onStateChange': onPlayerStateChange,
        'onError': (e) => console.error('Player error:', e)
      }
    });
  }

  function onPlayerStateChange(event) {
    if (!sbOk) return;
    if (event.data === YT.PlayerState.ENDED) {
      if (autoOn) skipVideo();
      else if (sbOk) sbSend('sync', { action: 'ended', time: 0 });
    } else if (event.data === YT.PlayerState.PLAYING) {
      if (syncTimer) clearInterval(syncTimer);
      syncTimer = setInterval(() => {
        if (player && player.getCurrentTime && sbOk) {
          sbSend('sync', { action: 'time', time: player.getCurrentTime() });
        }
      }, 3000);
    } else if (event.data === YT.PlayerState.PAUSED) {
      if (syncTimer) clearInterval(syncTimer);
      syncTimer = null;
    }
  }

  function loadVideo(videoId, seekTo = 0) {
    if (player && player.loadVideoById) {
      player.loadVideoById(videoId, seekTo);
    }
  }

  function playVideo() { if (player) player.playVideo(); }
  function pauseVideo() { if (player) player.pauseVideo(); }

  async function skipVideo() {
    if (queue.length === 0) return;
    if (qPos + 1 < queue.length) {
      qPos++;
      const next = queue[qPos];
      loadVideo(next.video_id);
      safeUpdQueue();
      if (sbOk) await sbSend('sync', { action: 'play', videoId: next.video_id, time: 0 });
      addAct('⏭', `Tocando agora: ${next.video_title.slice(0,30)}`);
    } else {
      toast('Fila vazia!', true);
      qPos = -1;
      safeUpdQueue();
    }
  }

  // ==================== FILA ====================
  function safeUpdQueue() {
    const list = $('queueList');
    if (!queue.length) {
      list.innerHTML = '<li style="color:var(--muted); text-align:center;">Nenhuma música na fila</li>';
      return;
    }
    list.innerHTML = queue.map((item, idx) => `
      <li class="queue-item ${idx === qPos ? 'playing' : ''}">
        <img class="queue-thumb" src="${item.thumbnail || 'https://via.placeholder.com/50x38'}" loading="lazy">
        <div class="queue-info">
          <div class="queue-title-text">${escapeHtml(item.video_title)}</div>
          <div class="queue-meta">Adicionado por: ${escapeHtml(item.added_by_name)}</div>
        </div>
        <div class="queue-actions">
          ${idx !== qPos ? `<button class="queue-btn" onclick="moveTo(${idx})">🎵</button>` : ''}
          <button class="queue-btn danger" onclick="removeFromQueue(${idx})">🗑</button>
        </div>
      </li>
    `).join('');
  }

  function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

  function moveTo(idx) {
    if (idx === qPos) return;
    const moved = queue.splice(idx, 1)[0];
    const newPos = qPos + 1;
    queue.splice(newPos, 0, moved);
    safeUpdQueue();
    if (sbOk) sbSend('queue-update', { queue, currentPosition: qPos });
    addAct('🎵', `${userName} moveu música na fila`);
    toast('Música movida para próximo!');
  }

  function removeFromQueue(idx) {
    const removed = queue[idx];
    queue.splice(idx, 1);
    if (idx === qPos) {
      if (queue.length > 0 && idx < queue.length) qPos = idx;
      else if (queue.length === 0) qPos = -1;
      else qPos--;
      if (qPos >= 0) loadVideo(queue[qPos].video_id);
    } else if (idx < qPos) qPos--;
    safeUpdQueue();
    if (sbOk) sbSend('queue-update', { queue, currentPosition: qPos });
    addAct('🗑', `${userName} removeu: ${removed.video_title.slice(0,30)}`);
    toast('Removido da fila!');
  }

  // ==================== MODAL E BUSCA ====================
  function openVidModal(){
    switchTab('link');
    $('vidModal').classList.add('open');
    $('vidInp').focus();
  }
  function closeVidModal(){
    $('vidModal').classList.remove('open');
    $('vidInp').value='';
    $('searchInp').value='';
    $('searchResults').innerHTML='<div style="text-align:center;color:var(--muted);padding:1.5rem;font-size:.85rem">Digite algo para buscar 🎵</div>';
  }

  function extractVideoId(url) {
    const reg = /(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&?/]+)/;
    const match = url.match(reg);
    return match ? match[1] : null;
  }

  async function addQueue() {
    const url = $('vidInp').value.trim();
    if (!url) { toast('Cole um link!', true); return; }
    const videoId = extractVideoId(url);
    if (!videoId) { toast('Link inválido!', true); return; }

    try {
      const res = await fetch(`https://noembed.com/embed?url=https://youtube.com/watch?v=${videoId}`);
      const data = await res.json();
      const title = data.title || 'Sem título';
      const thumb = `https://img.youtube.com/vi/${videoId}/default.jpg`;
      const newItem = {
        room_id: roomId, video_id: videoId, video_title: title, thumbnail: thumb,
        added_by: userId, added_by_name: userName, status: 'waiting', order: queue.length
      };
      queue.push(newItem);
      safeUpdQueue();
      if (sbOk) await sbSend('queue-update', { queue, currentPosition: qPos });
      closeVidModal();
      toast(`"${title.slice(0,35)}" adicionado! 🎵`);
      addAct('➕', `${userName} adicionou: ${title.slice(0,30)}`);
      if (qPos === -1 && autoOn) playNext();
    } catch (err) {
      console.error(err);
      toast('Erro ao buscar dados do vídeo', true);
    }
  }

  async function playNext() {
    if (queue.length === 0) return;
    if (qPos + 1 < queue.length) {
      qPos++;
      const next = queue[qPos];
      loadVideo(next.video_id);
      safeUpdQueue();
      if (sbOk) await sbSend('sync', { action: 'play', videoId: next.video_id, time: 0 });
      addAct('🎬', `Tocando: ${next.video_title.slice(0,30)}`);
    } else qPos = -1;
  }

  function toggleAuto() {
    autoOn = !autoOn;
    $('autoBtn').innerHTML = autoOn ? '🔄 Auto-play: ON' : '⏹ Auto-play: OFF';
    toast(autoOn ? 'Auto-play ativado' : 'Auto-play desativado');
  }

  // ==================== SOCKET.IO ====================
  async function initSocket() {
    socket = io('https://ntfy.sh', { path: '/socket.io/', transports: ['websocket', 'polling'] });
    socket.on('connect', () => console.log('Socket conectado'));
    socket.on('connect_error', err => console.error('Socket erro:', err));

    const subTopic = `syncroom-${roomId}`;
    socket.emit('subscribe', subTopic);
    sbOk = true;

    socket.on('message', async (data) => {
      try {
        const msg = JSON.parse(data);
        if (msg.senderId === userId) return;
        if (msg.type === 'queue-update') {
          queue = msg.payload.queue;
          qPos = msg.payload.currentPosition;
          safeUpdQueue();
        } else if (msg.type === 'sync') {
          const act = msg.payload.action;
          if (act === 'play') {
            if (player && msg.payload.videoId !== player.getVideoData()?.video_id)
              loadVideo(msg.payload.videoId, msg.payload.time || 0);
            else if (msg.payload.time) player.seekTo(msg.payload.time, true);
            player.playVideo();
          } else if (act === 'pause') player.pauseVideo();
          else if (act === 'time' && player && Math.abs(player.getCurrentTime() - msg.payload.time) > 2)
            player.seekTo(msg.payload.time, true);
          else if (act === 'ended' && autoOn) skipVideo();
        } else if (msg.type === 'activity') {
          addAct(msg.payload.icon, msg.payload.text);
        }
      } catch(e) { console.error(e); }
    });
  }

  async function sbSend(type, payload) {
    if (!sbOk) return false;
    const msg = { type, payload, senderId: userId, timestamp: Date.now() };
    socket.emit('message', JSON.stringify(msg));
    return true;
  }

  // ==================== INICIAR ====================
  async function init() {
    const urlParams = new URLSearchParams(window.location.search);
    roomId = urlParams.get('room');
    userName = localStorage.getItem('syncroom_user') || `User${Math.floor(Math.random()*1000)}`;
    localStorage.setItem('syncroom_user', userName);
    userId = `${userName}_${Date.now()}`;
    if (!roomId) { toast('Erro: Sala não especificada', true); return; }
    $('roomCode').innerText = roomId;
    if (window.YT) onYouTubeIframeAPIReady();
    else {
      const tag = document.createElement('script');
      tag.src = 'https://www.youtube.com/iframe_api';
      document.head.appendChild(tag);
    }
    await initSocket();
    
    // Event listeners
    $('searchInp').addEventListener('keypress', e => { if(e.key === 'Enter') doSearch(); });
    $('vidInp').addEventListener('keypress', e => { if(e.key === 'Enter') addQueue(); });
  }

  // ==================== BUSCA YOUTUBE ====================
  const YOUTUBE_API_KEY = 'AIzaSyBzWLKPA96ISDfEZV6rLe9S68et6PUVhno';

  function switchTab(t) {
    const isLink = t === 'link';
    $('paneLink').style.display = isLink ? '' : 'none';
    $('paneSearch').style.display = isLink ? 'none' : '';
    $('tabLink').style.background = isLink ? 'linear-gradient(135deg,var(--purple),var(--pink))' : 'transparent';
    $('tabLink').style.color = isLink ? '#fff' : 'var(--muted)';
    $('tabSearch').style.background = !isLink ? 'linear-gradient(135deg,var(--purple),var(--pink))' : 'transparent';
    $('tabSearch').style.color = !isLink ? '#fff' : 'var(--muted)';
    if (!isLink) setTimeout(() => $('searchInp').focus(), 80);
  }

  async function doSearch() {
    const q = ($('searchInp').value || '').trim();
    if (!q) { toast('Digite algo para buscar!', true); return; }
    const box = $('searchResults');
    box.innerHTML = '<div style="text-align:center;color:var(--muted);padding:1.5rem;font-size:.85rem">🔄 Buscando...</div>';
    try {
      const r = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=8&q=${encodeURIComponent(q)}&key=${YOUTUBE_API_KEY}`);
      const d = await r.json();
      if (!d.items || !d.items.length) { box.innerHTML = '<div style="text-align:center;color:var(--muted);padding:1.5rem;font-size:.85rem">Nenhum resultado encontrado</div>'; return; }
      box.innerHTML = d.items.map(it => {
        const vid = it.id.videoId;
        const title = it.snippet.title.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
        const ch = it.snippet.channelTitle.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
        const thumb = it.snippet.thumbnails.default.url;
        return `<div onclick="addFromSearch('${vid}','${title.replace(/'/g, '&#39;')}','${thumb}')" style="display:flex;align-items:center;gap:.65rem;background:var(--light);border-radius:.6rem;padding:.6rem;cursor:pointer;border:2px solid transparent;transition:border-color .15s" onmouseover="this.style.borderColor='var(--purple)'" onmouseout="this.style.borderColor='transparent'">
          <img src="${thumb}" style="width:72px;height:54px;object-fit:cover;border-radius:.35rem;flex-shrink:0">
          <div style="min-width:0">
            <div style="font-size:.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--txt)">${title}</div>
            <div style="font-size:.7rem;color:var(--muted);margin-top:.15rem">${ch}</div>
          </div>
        </div>`;
      }).join('');
    } catch (e) { box.innerHTML = '<div style="text-align:center;color:#ff4757;padding:1.5rem;font-size:.85rem">Erro na busca. Tente novamente.</div>'; }
  }

  async function addFromSearch(vid, title, thumb) {
    closeVidModal();
    const item = {
      room_id: roomId, video_id: vid, video_title: title, thumbnail: thumb,
      added_by: userId, added_by_name: userName, status: 'waiting', order: queue.length
    };
    queue.push(item);
    safeUpdQueue();
    if (sbOk) await sbSend('queue-update', { queue, currentPosition: qPos });
    toast(`"${title.slice(0,35)}" adicionado! 🎵`);
    addAct('➕', `${userName} adicionou: ${title.slice(0,30)}`);
    if (qPos === -1 && autoOn) playNext();
  }

  init();
</script>
</body>
</html>
