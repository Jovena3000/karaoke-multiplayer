<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Karaokê Multiplayer</title>
    <script src="https://sdk.mercadopago.com/js/v2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="root" class="min-h-screen bg-gradient-to-br from-indigo-600 to-purple-700 py-10 px-4">
        <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-2xl p-8">
            <h1 class="text-2xl font-bold text-center mb-6">🎤 Finalizar Compra</h1>
            <p class="text-center text-gray-500">Carregando checkout... Aguarde um momento.</p>
        </div>
    </div>
    
    <script>
        // Script mínimo para teste
        console.log('Checkout carregado!');
        document.getElementById('root').innerHTML = `
            <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-2xl p-8">
                <h1 class="text-2xl font-bold text-center mb-6">✅ Checkout Carregado!</h1>
                <p class="text-center text-gray-600">O sistema está funcionando corretamente.</p>
                <div class="text-center mt-6">
                    <button onclick="alert('Teste funcionando!')" class="bg-indigo-600 text-white px-6 py-3 rounded-lg">Testar Botão</button>
                </div>
            </div>
        `;
    </script>
</body>
</html>
